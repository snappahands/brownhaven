<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Deako Smart Lighting Demo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0d1117;font-family:system-ui,-apple-system,sans-serif}
  body{display:flex;flex-direction:column;padding:10px 12px;gap:8px;min-height:100vh}

  header{display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .logo{color:#fff;font-size:20px;font-weight:800;letter-spacing:.04em}
  .logo em{color:#7ecfe0;font-style:normal}
  .logo small{font-size:10px;color:#445;font-weight:400;margin-left:10px;letter-spacing:.12em;text-transform:uppercase}
  .hbtns{display:flex;gap:8px}
  .btn{padding:7px 18px;border-radius:24px;border:none;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.03em;transition:all .18s}
  .bon{background:#f5c842;color:#1a1a2e}.bon:hover{background:#ffd84a}
  .boff{background:#1b2233;color:#778;border:1px solid #2a3348}.boff:hover{color:#aaa}

  .scenes{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;flex-shrink:0}
  .sbtn{padding:6px 14px;border-radius:20px;border:1px solid #2a3348;background:#131928;color:#667;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:.03em}
  .sbtn:hover{border-color:#7ecfe0;color:#7ecfe0}
  .sbtn.active{background:#1a3a4a;border-color:#7ecfe0;color:#7ecfe0}
  .sbtn-mgr{border-color:#1e2d40;color:#445}.sbtn-mgr:hover{border-color:#7ecfe0;color:#7ecfe0}

  /* Scene Manager Modal */
  #sm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:none;align-items:center;justify-content:center}
  #sm-overlay.show{display:flex}
  #sm-panel{background:#111826;border:1px solid #2a3348;border-radius:16px;width:500px;max-width:96vw;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.7)}
  #sm-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a2535;flex-shrink:0}
  #sm-title{color:#fff;font-size:14px;font-weight:800;letter-spacing:.04em}
  .sm-close{background:none;border:none;color:#556;cursor:pointer;font-size:20px;line-height:1;padding:2px 6px}.sm-close:hover{color:#fff}
  #sm-body{flex:1;overflow-y:auto;padding:14px}
  /* Scene list */
  .scene-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid #1a2535;margin-bottom:8px;background:#0a0e17}
  .sr-info{flex:1;min-width:0}
  .sr-name{color:#fff;font-size:13px;font-weight:700}
  .sr-rooms{color:#445;font-size:10px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sr-btns{display:flex;gap:6px;flex-shrink:0}
  .sr-edit{padding:5px 12px;border-radius:6px;border:1px solid #2a3348;background:transparent;color:#7ecfe0;font-size:11px;font-weight:700;cursor:pointer}.sr-edit:hover{background:#1a3a4a}
  .sr-del{padding:5px 10px;border-radius:6px;border:1px solid #2a3348;background:transparent;color:#ff6b6b;font-size:11px;cursor:pointer}.sr-del:hover{background:#2a1515}
  #sm-add{width:100%;padding:10px;border-radius:8px;border:1px dashed #2a3348;background:transparent;color:#7ecfe0;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px}.#sm-add:hover{border-color:#7ecfe0}
  /* Scene editor */
  #se-view{display:none;flex-direction:column;gap:14px}
  #se-view.show{display:flex}
  .se-row{display:flex;gap:10px}
  .se-field{display:flex;flex-direction:column;gap:5px;flex:1}
  .se-label{color:#667;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .se-input{background:#0d1117;border:1px solid #2a3348;border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;outline:none;width:100%}.se-input:focus{border-color:#7ecfe0}
  .se-emoji{max-width:64px;text-align:center;font-size:18px}
  .se-room-list{display:flex;flex-direction:column;gap:5px;max-height:320px;overflow-y:auto}
  .se-rrow{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;background:#0d1117;border:1px solid #1a2535}
  .se-rrow.off .se-rlabel{color:#334}
  .se-rrow.off .se-rslider{opacity:.3;pointer-events:none}
  .se-rrow.off .se-rpct{color:#334}
  .se-rrow.off .se-rtimer{opacity:.3;pointer-events:none}
  .se-rcheck{width:15px;height:15px;accent-color:#f5c842;cursor:pointer;flex-shrink:0}
  .se-rlabel{flex:1;font-size:12px;color:#aaa}
  .se-rslider{flex:2;accent-color:#f5c842;cursor:pointer;height:4px}
  .se-rpct{font-size:11px;color:#f5c842;font-weight:700;min-width:32px;text-align:right}
  .se-rtimer{background:#0d1117;border:1px solid #2a3348;border-radius:5px;color:#7ecfe0;font-size:10px;font-weight:700;padding:3px 5px;cursor:pointer;flex-shrink:0}
  .se-rtimer:focus{outline:none;border-color:#7ecfe0}
  .se-footer{display:flex;gap:8px;padding-top:2px}
  .se-back{flex:1;padding:9px;border-radius:8px;border:1px solid #2a3348;background:transparent;color:#778;font-size:12px;font-weight:700;cursor:pointer}.se-back:hover{color:#aaa}
  .se-save{flex:2;padding:9px;border-radius:8px;border:none;background:#f5c842;color:#0d1117;font-size:12px;font-weight:800;cursor:pointer}.se-save:hover{background:#ffd84a}

  #fpbox{position:relative;flex:1 1 auto;min-height:0;border-radius:10px;overflow:hidden;border:1px solid #1a2535;background:#0a0e17}
  #fpimg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:block;pointer-events:none;user-select:none}
  #svgl{position:absolute;pointer-events:none}

  .statusbar{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;padding-right:110px;background:#111826;border-radius:8px;border:1px solid #1a2535}
  #stxt{color:#7ecfe0;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  #scnt{color:#334;font-size:11px}
  #scnt span{color:#f5c842;font-weight:700}
  .dtag{font-size:10px;color:#2a3348;letter-spacing:.06em}
  #debug-btn{position:fixed;bottom:10px;right:10px;z-index:9999;padding:8px 14px;background:#cc0000;color:#fff;border:2px solid #ff4444;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
  #debug-btn:hover{background:#ff2222}
  #mapper-panel{position:fixed;left:10px;top:50%;transform:translateY(-50%);background:#111826;border:1px solid #2a3348;border-radius:10px;padding:10px;width:148px;z-index:9999;display:none;flex-direction:column;gap:6px;max-height:80vh}
  #mapper-panel.show{display:flex}
  #mapper-title{color:#7ecfe0;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid #1a2535;padding-bottom:6px}
  #mapper-room-list{display:flex;flex-direction:column;gap:3px;overflow-y:auto;max-height:320px}
  .mrb{padding:5px 8px;border-radius:5px;border:1px solid #1a2535;background:transparent;color:#556;font-size:11px;font-weight:700;cursor:pointer;text-align:left}
  .mrb:hover{border-color:#f5c842;color:#f5c842}
  .mrb.active{background:#1a2535;border-color:#7ecfe0;color:#7ecfe0}
  #mapper-info{font-size:10px;color:#445;font-family:monospace;white-space:pre;background:#0a0e17;padding:6px;border-radius:5px;min-height:36px}
  #mapper-hint{font-size:9px;color:#334;font-style:italic}
  .mapper-action{padding:6px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;width:100%}
  #mapper-copy-btn{background:#f5c842;color:#0d1117}.#mapper-copy-btn:hover{background:#ffd84a}
  #mapper-exit-btn{background:#1b2233;color:#778;border:1px solid #2a3348}.#mapper-exit-btn:hover{color:#aaa}

  /* Dimmer popup */
  #dimmer-popup{
    position:fixed;
    background:#1a2235;
    border:1px solid #2e3f58;
    border-radius:14px;
    padding:16px 18px;
    width:220px;
    box-shadow:0 8px 32px rgba(0,0,0,0.6);
    z-index:999;
    display:none;
    flex-direction:column;
    gap:10px;
  }
  #dimmer-popup.show{display:flex}
  #dimmer-title{color:#fff;font-size:13px;font-weight:700;letter-spacing:.03em}
  #dimmer-subtitle{color:#556;font-size:10px;letter-spacing:.06em;text-transform:uppercase;margin-top:-6px}
  .dim-row{display:flex;align-items:center;gap:10px}
  .dim-icon{font-size:14px;flex-shrink:0}
  #dim-slider{
    -webkit-appearance:none;appearance:none;
    flex:1;height:6px;border-radius:3px;
    background:linear-gradient(to right,#f5c842 0%,#f5c842 var(--pct,100%),#2a3a50 var(--pct,100%),#2a3a50 100%);
    outline:none;cursor:pointer;
  }
  #dim-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#f5c842;cursor:pointer;box-shadow:0 0 6px rgba(245,200,66,0.6)}
  #dim-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#f5c842;cursor:pointer;border:none}
  #dim-value{color:#f5c842;font-size:13px;font-weight:700;min-width:36px;text-align:right}
  .dim-timer-section{display:flex;flex-direction:column;gap:5px}
  .dim-timer-label{color:#556;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .dim-timer-btns{display:flex;gap:5px}
  .dim-tbtn{flex:1;padding:5px 0;border-radius:6px;border:1px solid #2a3348;background:#0d1117;color:#556;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
  .dim-tbtn:hover{border-color:#7ecfe0;color:#7ecfe0}
  .dim-tbtn.active{background:#1a3a4a;border-color:#7ecfe0;color:#7ecfe0}
  .dim-btns{display:flex;gap:8px;margin-top:2px}
  .dim-btn{flex:1;padding:7px 0;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s}
  .dim-off{background:#0d1117;color:#778;border:1px solid #2a3348}.dim-off:hover{color:#aaa}
  .dim-close{background:#f5c842;color:#1a1a2e}.dim-close:hover{background:#ffd84a}
  #dimmer-overlay{position:fixed;inset:0;z-index:998;display:none}
  #dimmer-overlay.show{display:block}
</style>
</head>
<body>

<header>
  <div class="logo">deako<em>.</em><small>Smart Lighting Demo</small></div>
  <div class="hbtns">
    <button class="btn bon" onclick="allOn()">☀ All On</button>
    <button class="btn boff" onclick="allOff()">⏻ All Off</button>
  </div>
</header>

<div class="scenes" id="scenes-row"></div>

<div id="fpbox">
  <img id="fpimg" src="https://i.ibb.co/Kp40nS53/Brown-Haven-Preview.webp" crossorigin="anonymous" draggable="false" alt="">
  <svg id="svgl" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
</div>
<button id="debug-btn" onclick="toggleDebug()">⊞ Mapper</button>
<div id="mapper-panel">
  <div id="mapper-title">Room Mapper</div>
  <div id="mapper-room-list"></div>
  <div id="mapper-info"></div>
  <div id="mapper-hint">Click a room, then drag on the floor plan to set its boundary.</div>
  <button class="mapper-action" id="mapper-copy-btn" onclick="copyCoords()">📋 Copy Coords</button>
  <button class="mapper-action" id="mapper-exit-btn" onclick="toggleDebug()">✕ Exit Mapper</button>
</div>

<div class="statusbar">
  <span id="stxt">Tap a room to toggle · Long-press to dim</span>
  <span id="scnt"><span id="ln">0</span> / 14 rooms lit</span>
  <span class="dtag">DEAKO SMART LIGHTING &nbsp;·&nbsp; <span id="version" style="font-weight:900;color:#7ecfe0;font-size:14px;letter-spacing:.04em">v2.6</span></span>
</div>

<!-- Scene Manager Modal -->
<div id="sm-overlay" onclick="smOverlayClick(event)">
  <div id="sm-panel">
    <div id="sm-header">
      <span id="sm-title">Manage Scenes</span>
      <button class="sm-close" onclick="closeSceneMgr()">✕</button>
    </div>
    <div id="sm-body">
      <!-- List view -->
      <div id="sm-list">
        <div id="sm-rows"></div>
        <button id="sm-add" onclick="openSceneEditor(null)">+ Add New Scene</button>
      </div>
      <!-- Editor view -->
      <div id="se-view">
        <div class="se-row">
          <div class="se-field" style="max-width:68px">
            <label class="se-label">Icon</label>
            <input class="se-input se-emoji" id="se-emoji" type="text" maxlength="2" placeholder="✨">
          </div>
          <div class="se-field">
            <label class="se-label">Scene Name</label>
            <input class="se-input" id="se-name" type="text" placeholder="My Scene">
          </div>
        </div>
        <div class="se-field">
          <label class="se-label">Rooms &amp; Brightness</label>
          <div class="se-room-list" id="se-rooms"></div>
        </div>
        <div class="se-footer">
          <button class="se-back" onclick="backToList()">← Back</button>
          <button class="se-save" onclick="saveScene()">Save Scene</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Dimmer popup -->
<div id="dimmer-overlay" onclick="closeDimmer()"></div>
<div id="dimmer-popup">
  <div id="dimmer-title">Room Name</div>
  <div id="dimmer-subtitle">Dimmer Control</div>
  <div class="dim-row">
    <span class="dim-icon">🌑</span>
    <input type="range" id="dim-slider" min="5" max="100" value="100" oninput="onDimSlide(this.value)">
    <span class="dim-icon">☀</span>
  </div>
  <div id="dim-value">100%</div>
  <div class="dim-timer-section">
    <div class="dim-timer-label">⏱ Timer</div>
    <div class="dim-timer-btns">
      <button class="dim-tbtn active" id="dt-0"   onclick="setDimTimer(0)">Off</button>
      <button class="dim-tbtn"        id="dt-10"  onclick="setDimTimer(10)">10s</button>
      <button class="dim-tbtn"        id="dt-300" onclick="setDimTimer(300)">5 min</button>
    </div>
  </div>
  <div class="dim-btns">
    <button class="dim-btn dim-off" onclick="turnRoomOff()">Turn Off</button>
    <button class="dim-btn dim-close" onclick="closeDimmer()">Done</button>
  </div>
</div>

<script>
const ROOMS = [
  {id:"dining",  label:"Dining",        x:12.50, y:20.88, w:24.90, h:19.46},
  {id:"kitchen", label:"Kitchen",       x:12.50, y:40.60, w:25.00, h:17.51},
  {id:"great",   label:"Great Room",    x:38.33, y:20.88, w:26.03, h:37.10},
  {id:"owners",  label:"Owner's Suite", x:65.60, y:20.88, w:24.59, h:27.89},
  {id:"owic",    label:"O. WIC",        x:65.50, y:50.06, w:8.47,  h:22.70},
  {id:"obath",   label:"O. Bath",       x:74.69, y:50.19, w:15.70, h:22.44},
  {id:"foyer",   label:"Foyer",         x:38.75, y:58.71, w:7.35,  h:17.69},
  {id:"strg",    label:"Staircase",     x:46.59, y:58.63, w:18.08, h:18.15},
  {id:"pantry",  label:"Pantry",        x:25.00, y:59.14, w:8.57,  h:8.82},
  {id:"mudroom", label:"Mud Room",      x:5.48,  y:59.40, w:18.80, h:8.43},
  {id:"laundry", label:"Laundry",       x:13.02, y:69.00, w:11.46, h:11.93},
  {id:"powder",  label:"Powder",        x:25.31, y:68.87, w:8.26,  h:12.06},
  {id:"porch",   label:"Front Porch",   x:37.91, y:77.82, w:26.97, h:9.47},
  {id:"deck",    label:"Rear Deck",     x:38.12, y:4.67,  w:26.96, h:14.79},
];
const DEFAULT_SCENES = [
  {key:"arrive",  emoji:"🏠", name:"Arrive Home",  rooms:[{id:"porch",lv:100},{id:"foyer",lv:100},{id:"mudroom",lv:100},{id:"kitchen",lv:70},{id:"great",lv:80}]},
  {key:"dinner",  emoji:"🍽", name:"Dinner",        rooms:[{id:"dining",lv:80},{id:"kitchen",lv:60},{id:"great",lv:50}]},
  {key:"evening", emoji:"🌙", name:"Wind Down",     rooms:[{id:"great",lv:30},{id:"owic",lv:40},{id:"owners",lv:60}]},
  {key:"vacation",emoji:"🔒", name:"Vacation Mode", staggerMs:10000, rooms:[{id:"porch",lv:55},{id:"foyer",lv:100},{id:"kitchen",lv:75},{id:"dining",lv:60},{id:"great",lv:45},{id:"owners",lv:70}]},
  {key:"morning", emoji:"☀", name:"Good Morning",  rooms:[{id:"owners",lv:70},{id:"laundry",lv:80},{id:"mudroom",lv:80},{id:"foyer",lv:100},{id:"dining",lv:100},{id:"kitchen",lv:100}]},
];
let scenesData = JSON.parse(localStorage.getItem("bhScenes") || "null") || DEFAULT_SCENES.map(s=>({...s,rooms:[...s.rooms]}));
// Migrate vacation scene if stored version is old (no staggerMs)
(()=>{ const v=scenesData.find(s=>s.key==="vacation"); if(v&&!v.staggerMs){const d=DEFAULT_SCENES.find(s=>s.key==="vacation");Object.assign(v,{staggerMs:d.staggerMs,rooms:[...d.rooms]});localStorage.setItem("bhScenes",JSON.stringify(scenesData));} })();

// State: brightness 0=off, 1–100=dim level
let levels = {};
ROOMS.forEach(r => levels[r.id] = 0);

let roomTimers = {};
let roomTimerSettings = JSON.parse(localStorage.getItem("bhRoomTimers") || "{}");
let dimTimerSelected = 0;

function cancelTimer(id) {
  if (roomTimers[id]) { clearTimeout(roomTimers[id]); delete roomTimers[id]; }
}
function cancelAllTimers() {
  Object.keys(roomTimers).forEach(id => cancelTimer(id));
}
function saveTimerSettings() {
  localStorage.setItem("bhRoomTimers", JSON.stringify(roomTimerSettings));
}
function startRoomTimer(id, seconds) {
  cancelTimer(id);
  const label = ROOMS.find(r=>r.id===id).label;
  roomTimers[id] = setTimeout(()=>{
    levels[id]=0; renderRoom(id); updateCount(); updateImg();
    setStatus(label+" — Timer Off");
    cancelTimer(id);
  }, seconds * 1000);
}
function setDimTimer(val) {
  dimTimerSelected = val;
  [0, 10, 300].forEach(v => {
    document.getElementById("dt-"+v).classList.toggle("active", dimTimerSelected === v);
  });
}

let activeDimRoom = null;
let pressTimer = null;

const svg   = document.getElementById("svgl");
const fpimg = document.getElementById("fpimg");
const fpbox = document.getElementById("fpbox");

// Set image AND SVG to the same explicit pixel dimensions from one calculation
function sizeAndAlign() {
  if (!fpimg.naturalWidth) return;
  const bW = fpbox.clientWidth, bH = fpbox.clientHeight;
  if (!bW || !bH) return;
  const iW = fpimg.naturalWidth, iH = fpimg.naturalHeight;
  const scale = Math.min(bW / iW, bH / iH);
  const dW = Math.round(iW * scale);
  const dH = Math.round(iH * scale);
  const ox = Math.round((bW - dW) / 2);
  const oy = Math.round((bH - dH) / 2);
  // Force image to exact computed dimensions
  fpimg.style.width  = dW + "px";
  fpimg.style.height = dH + "px";
  // SVG uses identical dimensions and position
  svg.style.left   = ox + "px";
  svg.style.top    = oy + "px";
  svg.style.width  = dW + "px";
  svg.style.height = dH + "px";
}
fpimg.addEventListener("load", () => requestAnimationFrame(sizeAndAlign));
if (fpimg.complete && fpimg.naturalWidth) requestAnimationFrame(sizeAndAlign);
window.addEventListener("resize", () => requestAnimationFrame(sizeAndAlign));
new ResizeObserver(() => requestAnimationFrame(sizeAndAlign)).observe(fpbox);


// Build SVG defs
const defs = document.createElementNS("http://www.w3.org/2000/svg","defs");
defs.innerHTML = `<filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
  <feGaussianBlur stdDeviation="1.6" result="cb"/>
  <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>`;
svg.appendChild(defs);

ROOMS.forEach(r => {
  const radId = "rad-"+r.id;
  const rg = document.createElementNS("http://www.w3.org/2000/svg","radialGradient");
  rg.setAttribute("id",radId); rg.setAttribute("cx","50%"); rg.setAttribute("cy","40%"); rg.setAttribute("r","60%");
  rg.innerHTML=`<stop offset="0%" stop-color="rgba(255,235,100,0.45)"/><stop offset="100%" stop-color="rgba(255,200,40,0)"/>`;
  defs.appendChild(rg);

  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.id = "g-"+r.id; g.style.cursor="pointer"; g.style.pointerEvents="all";

  const mk=(tag,attrs)=>{const el=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;};

  const glowR=mk("rect",{class:"glow-rect",x:r.x,y:r.y,width:r.w,height:r.h,rx:"0.5",fill:"rgba(255,215,50,0.15)",filter:"url(#glow)"});
  glowR.style.display="none";

  const fillR=mk("rect",{class:"fill-rect",x:r.x,y:r.y,width:r.w,height:r.h,rx:"0.4",fill:"rgba(255,255,255,0.02)",stroke:"rgba(255,255,255,0.08)","stroke-width":"0.22"});
  fillR.style.transition="fill .35s,stroke .35s,opacity .35s";

  const radR=mk("rect",{class:"rad-rect",x:r.x,y:r.y,width:r.w,height:r.h,rx:"0.4",fill:`url(#${radId})`});
  radR.style.display="none"; radR.style.pointerEvents="none"; radR.style.transition="opacity .35s";

  // Dim % badge (moved up to leave room for slider)
  const badge=mk("text",{class:"dim-badge",x:r.x+r.w/2,y:r.y+2,"text-anchor":"middle","dominant-baseline":"middle","font-size":"1.8","font-weight":"900","font-family":"system-ui,sans-serif",fill:"rgba(255,230,100,0.95)","letter-spacing":"0.02"});
  badge.style.pointerEvents="none"; badge.style.display="none";

  const dot=mk("circle",{class:"dot",cx:r.x+r.w-1.8,cy:r.y+2,r:"1.1",fill:"rgba(255,255,255,0.1)"});
  dot.style.transition="fill .3s"; dot.style.pointerEvents="none";

  // In-room dim slider
  const slPad=1.0, slY=r.y+r.h-1.1, slH=0.45, slTW=r.w-slPad*2;
  const slGroup=document.createElementNS("http://www.w3.org/2000/svg","g");
  slGroup.classList.add("sl-group"); slGroup.style.display="none"; slGroup.style.pointerEvents="all"; slGroup.style.cursor="ew-resize";
  const slHit =mk("rect",{x:r.x+slPad-0.5,y:slY-1.0,width:slTW+1,height:slH+2.0,fill:"transparent"});
  const slTrack=mk("rect",{class:"sl-track",x:r.x+slPad,y:slY,width:slTW,height:slH,rx:"0.25",fill:"rgba(0,0,0,0.45)"});
  const slFill =mk("rect",{class:"sl-fill", x:r.x+slPad,y:slY,width:slTW,height:slH,rx:"0.25",fill:"#f5c842"});
  const slThumb=mk("circle",{class:"sl-thumb",cx:r.x+slPad+slTW,cy:slY+slH/2,r:"0.9",fill:"#f5c842",stroke:"rgba(255,255,255,0.85)","stroke-width":"0.22"});
  [slHit,slTrack,slFill,slThumb].forEach(el=>slGroup.appendChild(el));
  slGroup.addEventListener("mousedown", e=>{e.stopPropagation(); if(latchedDimRoom===r.id){exitLatchMode();}else{if(latchedDimRoom)exitLatchMode();enterLatchMode(r.id,e);}});
  slGroup.addEventListener("mouseup",   e=>{e.stopPropagation();});
  slGroup.addEventListener("touchstart",e=>{e.stopPropagation();e.preventDefault();sliderDrag={id:r.id};doSliderPos(e);},{passive:false});
  slGroup.addEventListener("touchend",  e=>{e.stopPropagation();sliderDrag=null;});

  [glowR,fillR,radR,badge,dot,slGroup].forEach(el=>g.appendChild(el));

  // Click = toggle, long press = open dimmer
  g.addEventListener("mousedown",  e => startPress(r.id, e));
  g.addEventListener("touchstart", e => startPress(r.id, e), {passive:true});
  g.addEventListener("mouseup",    () => endPress(r.id));
  g.addEventListener("mouseleave", () => cancelPress());
  g.addEventListener("touchend",   () => endPress(r.id));

  svg.appendChild(g);
});

let pressTarget = null;
let didLongPress = false;

// ── IN-ROOM SLIDER ──
let latchedDimRoom = null;
let sliderDrag = null; // touch-drag only

function enterLatchMode(id, e) {
  latchedDimRoom = id;
  doSliderPos(e);
}
function exitLatchMode() {
  latchedDimRoom = null;
}
function doSliderPos(e) {
  const id = latchedDimRoom || (sliderDrag && sliderDrag.id);
  if (!id) return;
  const r = ROOMS.find(rm=>rm.id===id);
  const svgRect = svg.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const svgX = (cx - svgRect.left) / svgRect.width * 100;
  const pct = Math.max(0, Math.min(1, (svgX - (r.x+1.0)) / (r.w-2.0)));
  const val = Math.max(5, Math.round(pct * 100));
  levels[id] = val;
  renderRoom(id);
  updateCount(); updateImg();
}
window.addEventListener("mousemove", e => { if (latchedDimRoom) doSliderPos(e); });
window.addEventListener("touchmove", e => { if (sliderDrag) { e.preventDefault(); doSliderPos(e); } }, {passive:false});
window.addEventListener("touchend",  () => { sliderDrag = null; });

function startPress(id, e) {
  if (latchedDimRoom) { exitLatchMode(); return; }
  pressTarget = id;
  didLongPress = false;
  pressTimer = setTimeout(() => {
    didLongPress = true;
    openDimmer(id, e);
  }, 400);
}
function endPress(id) {
  clearTimeout(pressTimer);
  if (!didLongPress && pressTarget === id) toggle(id);
  pressTarget = null;
}
function cancelPress() {
  clearTimeout(pressTimer);
  pressTarget = null;
}

function toggle(id) {
  cancelTimer(id);
  document.querySelectorAll(".sbtn").forEach(b=>b.classList.remove("active"));
  if (levels[id] > 0) {
    levels[id] = 0;
    renderRoom(id);
    setStatus(ROOMS.find(r=>r.id===id).label + " — Off");
  } else {
    levels[id] = 100;
    renderRoom(id);
    setStatus(ROOMS.find(r=>r.id===id).label + " — On");
    if (roomTimerSettings[id]) startRoomTimer(id, roomTimerSettings[id]);
  }
  updateCount(); updateImg();
}

function renderRoom(id) {
  const lv = levels[id];
  const g = document.getElementById("g-"+id); if(!g)return;
  const gl=g.querySelector(".glow-rect");
  const fr=g.querySelector(".fill-rect");
  const rr=g.querySelector(".rad-rect");
  const bg=g.querySelector(".dim-badge");
  const dt=g.querySelector(".dot");
  const sg=g.querySelector(".sl-group");
  const sf=g.querySelector(".sl-fill");
  const sth=g.querySelector(".sl-thumb");
  const on = lv > 0;
  const a = lv / 100;

  if (on) {
    gl.style.display="block"; gl.setAttribute("opacity", 0.4 + a*0.6);
    fr.setAttribute("fill",`rgba(255,210,60,${0.07+a*0.18})`);
    fr.setAttribute("stroke",`rgba(255,200,40,${0.3+a*0.3})`);
    fr.setAttribute("stroke-width","0.38");
    rr.style.display="block"; rr.setAttribute("opacity", a);
    dt.setAttribute("fill",`rgba(255,216,74,${0.4+a*0.6})`);
    bg.style.display="block";
    bg.textContent = lv+"%";
    if (sg) {
      sg.style.display="block";
      const r = ROOMS.find(rm=>rm.id===id);
      const trackW = r.w - 2.0;
      const fillW = Math.max(0, (lv/100) * trackW);
      sf.setAttribute("width", fillW);
      sth.setAttribute("cx", r.x + 1.0 + fillW);
    }
  } else {
    gl.style.display="none";
    fr.setAttribute("fill","rgba(255,255,255,0.02)");
    fr.setAttribute("stroke","rgba(255,255,255,0.08)");
    fr.setAttribute("stroke-width","0.22");
    rr.style.display="none";
    dt.setAttribute("fill","rgba(255,255,255,0.1)");
    bg.style.display="none";
    if (sg) sg.style.display="none";
  }
}

function updateImg() {
  const vals = Object.values(levels);
  const avg = vals.reduce((s,v)=>s+v,0) / (vals.length*100);
  fpimg.style.filter=`brightness(${0.28+avg*0.52}) saturate(${0.15+avg*0.65}) contrast(1.05)`;
}
function updateCount() {
  document.getElementById("ln").textContent = Object.values(levels).filter(v=>v>0).length;
}
function setStatus(m){ document.getElementById("stxt").textContent=m.toUpperCase(); }

// ── DIMMER POPUP ──
function openDimmer(id, e) {
  activeDimRoom = id;
  const room = ROOMS.find(r=>r.id===id);
  const lv = levels[id] || 100;
  document.getElementById("dimmer-title").textContent = room.label;
  const sl = document.getElementById("dim-slider");
  sl.value = lv;
  updateSliderStyle(lv);
  document.getElementById("dim-value").textContent = lv+"%";

  // Position near click
  const popup = document.getElementById("dimmer-popup");
  popup.classList.add("show");
  document.getElementById("dimmer-overlay").classList.add("show");

  // Get position from event
  let cx=0, cy=0;
  if (e && e.clientX) { cx=e.clientX; cy=e.clientY; }
  else if (e && e.touches) { cx=e.touches[0].clientX; cy=e.touches[0].clientY; }

  let left = cx - 110;
  let top  = cy - 160;
  left = Math.max(8, Math.min(left, window.innerWidth - 236));
  top  = Math.max(8, Math.min(top,  window.innerHeight - 220));
  popup.style.left = left+"px";
  popup.style.top  = top+"px";

  if (lv === 0) { levels[id]=100; renderRoom(id); updateCount(); updateImg(); }

  // Restore current timer selection for this room
  dimTimerSelected = roomTimerSettings[id] || 0;
  setDimTimer(dimTimerSelected);

  setStatus(room.label + " — Dimmer");
}

function closeDimmer() {
  if (activeDimRoom) {
    cancelTimer(activeDimRoom);
    if (dimTimerSelected > 0) {
      roomTimerSettings[activeDimRoom] = dimTimerSelected;
      saveTimerSettings();
      if (levels[activeDimRoom] > 0) startRoomTimer(activeDimRoom, dimTimerSelected);
    } else {
      delete roomTimerSettings[activeDimRoom];
      saveTimerSettings();
    }
  }
  document.getElementById("dimmer-popup").classList.remove("show");
  document.getElementById("dimmer-overlay").classList.remove("show");
  activeDimRoom = null;
}

function onDimSlide(val) {
  val = parseInt(val);
  updateSliderStyle(val);
  document.getElementById("dim-value").textContent = val+"%";
  if (activeDimRoom) {
    levels[activeDimRoom] = val;
    renderRoom(activeDimRoom);
    updateCount(); updateImg();
    setStatus(ROOMS.find(r=>r.id===activeDimRoom).label + " — "+val+"%");
  }
}

function updateSliderStyle(val) {
  const sl = document.getElementById("dim-slider");
  sl.style.setProperty("--pct", val+"%");
}

function turnRoomOff() {
  if (activeDimRoom) {
    cancelTimer(activeDimRoom);
    levels[activeDimRoom] = 0;
    renderRoom(activeDimRoom);
    updateCount(); updateImg();
    setStatus(ROOMS.find(r=>r.id===activeDimRoom).label + " — Off");
  }
  // Close without saving timer selection
  document.getElementById("dimmer-popup").classList.remove("show");
  document.getElementById("dimmer-overlay").classList.remove("show");
  activeDimRoom = null;
}

function allOn() {
  exitLatchMode();
  cancelAllTimers();
  document.querySelectorAll(".sbtn").forEach(b=>b.classList.remove("active"));
  ROOMS.forEach(r=>{levels[r.id]=100;renderRoom(r.id);});
  updateCount(); updateImg(); setStatus("All Lights On");
  ROOMS.forEach(r=>{ if (roomTimerSettings[r.id]) startRoomTimer(r.id, roomTimerSettings[r.id]); });
}
function allOff() {
  exitLatchMode();
  cancelAllTimers();
  document.querySelectorAll(".sbtn").forEach(b=>b.classList.remove("active"));
  ROOMS.forEach(r=>{levels[r.id]=0;renderRoom(r.id);});
  updateCount(); updateImg(); setStatus("All Lights Off");
}
function runScene(btn, key) {
  exitLatchMode();
  cancelAllTimers();
  document.querySelectorAll(".sbtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  ROOMS.forEach(r=>{levels[r.id]=0;renderRoom(r.id);});
  const sc = scenesData.find(s=>s.key===key); if(!sc) return;
  setStatus(sc.emoji+" "+sc.name+" Scene");
  const stagger = sc.staggerMs || 220;
  sc.rooms.forEach((item,i)=>{
    setTimeout(()=>{
      levels[item.id]=item.lv;
      renderRoom(item.id);
      updateCount(); updateImg();
      if (item.timer > 0) {
        // Scene has a timer — use it
        startRoomTimer(item.id, item.timer);
      } else {
        // Scene has no timer for this room — clear its persistent setting
        delete roomTimerSettings[item.id];
        saveTimerSettings();
      }
    }, i*stagger);
  });
}

// ── SCENE BUTTONS ──────────────────────────────────────────────────────────
function renderSceneButtons() {
  const row = document.getElementById("scenes-row");
  row.innerHTML = "";
  scenesData.forEach(sc => {
    const b = document.createElement("button");
    b.className = "sbtn";
    b.textContent = sc.emoji+" "+sc.name;
    b.onclick = () => runScene(b, sc.key);
    row.appendChild(b);
  });
  const mgr = document.createElement("button");
  mgr.className = "sbtn sbtn-mgr";
  mgr.textContent = "⚙ Scenes";
  mgr.onclick = openSceneMgr;
  row.appendChild(mgr);
}

// ── SCENE MANAGER ──────────────────────────────────────────────────────────
function openSceneMgr() {
  renderSceneRows();
  document.getElementById("sm-list").style.display = "block";
  document.getElementById("se-view").classList.remove("show");
  document.getElementById("sm-title").textContent = "Manage Scenes";
  document.getElementById("sm-overlay").classList.add("show");
}
function closeSceneMgr() { document.getElementById("sm-overlay").classList.remove("show"); }
function smOverlayClick(e) { if(e.target===document.getElementById("sm-overlay")) closeSceneMgr(); }

function renderSceneRows() {
  const el = document.getElementById("sm-rows");
  el.innerHTML = "";
  scenesData.forEach(sc => {
    const div = document.createElement("div");
    div.className = "scene-row";
    const roomSummary = sc.rooms.map(r=>{ const rm=ROOMS.find(x=>x.id===r.id); return (rm?rm.label:r.id)+" "+r.lv+"%"; }).join(", ");
    div.innerHTML = `
      <div class="sr-info">
        <div class="sr-name">${sc.emoji} ${sc.name}</div>
        <div class="sr-rooms">${roomSummary}</div>
      </div>
      <div class="sr-btns">
        <button class="sr-edit" onclick="openSceneEditor('${sc.key}')">Edit</button>
        <button class="sr-del"  onclick="deleteScene('${sc.key}')">✕</button>
      </div>`;
    el.appendChild(div);
  });
}

let editingKey = null;
function openSceneEditor(key) {
  editingKey = key;
  document.getElementById("sm-title").textContent = key ? "Edit Scene" : "New Scene";
  document.getElementById("sm-list").style.display = "none";
  document.getElementById("se-view").classList.add("show");
  const sc = key ? scenesData.find(s=>s.key===key) : null;
  document.getElementById("se-emoji").value = sc ? sc.emoji : "✨";
  document.getElementById("se-name").value  = sc ? sc.name  : "";
  const container = document.getElementById("se-rooms");
  container.innerHTML = "";
  ROOMS.forEach(r => {
    const existing = sc ? sc.rooms.find(x=>x.id===r.id) : null;
    const checked  = !!existing;
    const lv       = existing ? existing.lv : 100;
    const timerVal = existing ? (existing.timer || 0) : 0;
    const row = document.createElement("div");
    row.className = "se-rrow"+(checked?"":" off");
    row.id = "ser-"+r.id;
    row.innerHTML = `
      <input type="checkbox" class="se-rcheck" id="sec-${r.id}" ${checked?"checked":""} onchange="toggleRoomInEditor('${r.id}')">
      <label class="se-rlabel" for="sec-${r.id}">${r.label}</label>
      <input type="range" class="se-rslider" id="sesl-${r.id}" min="5" max="100" value="${lv}" oninput="document.getElementById('sepct-${r.id}').textContent=this.value+'%'">
      <span class="se-rpct" id="sepct-${r.id}">${lv}%</span>
      <select class="se-rtimer" id="setmr-${r.id}">
        <option value="0" ${timerVal===0?"selected":""}>⏱ Off</option>
        <option value="10" ${timerVal===10?"selected":""}>10s</option>
        <option value="300" ${timerVal===300?"selected":""}>5min</option>
      </select>`;
    container.appendChild(row);
  });
}
function toggleRoomInEditor(id) {
  const checked = document.getElementById("sec-"+id).checked;
  document.getElementById("ser-"+id).classList.toggle("off", !checked);
}
function backToList() {
  renderSceneRows();
  document.getElementById("sm-list").style.display = "block";
  document.getElementById("se-view").classList.remove("show");
  document.getElementById("sm-title").textContent = "Manage Scenes";
}
function saveScene() {
  const emoji = document.getElementById("se-emoji").value.trim() || "✨";
  const name  = document.getElementById("se-name").value.trim();
  if (!name) { document.getElementById("se-name").focus(); return; }
  const rooms = ROOMS
    .filter(r => document.getElementById("sec-"+r.id)?.checked)
    .map(r => ({ id: r.id, lv: parseInt(document.getElementById("sesl-"+r.id).value), timer: parseInt(document.getElementById("setmr-"+r.id).value) || 0 }));
  if (editingKey) {
    const sc = scenesData.find(s=>s.key===editingKey);
    sc.emoji=emoji; sc.name=name; sc.rooms=rooms;
  } else {
    scenesData.push({ key:"scene_"+Date.now(), emoji, name, rooms });
  }
  localStorage.setItem("bhScenes", JSON.stringify(scenesData));
  renderSceneButtons();
  backToList();
}
function deleteScene(key) {
  if (!confirm("Delete this scene?")) return;
  scenesData = scenesData.filter(s=>s.key!==key);
  localStorage.setItem("bhScenes", JSON.stringify(scenesData));
  renderSceneButtons();
  renderSceneRows();
}

renderSceneButtons();

// ── MAPPER ──
let mapperOn = false;
let activeMapRoom = null;
let mapDragStart = null;
let mapPreviewRect = null;

function toggleDebug() {
  mapperOn = !mapperOn;
  const btn = document.getElementById("debug-btn");
  if (mapperOn) {
    btn.textContent = "✕ Exit Mapper";
    btn.style.background = "#334";
    openMapper();
  } else {
    btn.textContent = "⊞ Mapper";
    btn.style.background = "#cc0000";
    closeMapper();
  }
}

function openMapper() {
  // Show panel
  document.getElementById("mapper-panel").classList.add("show");

  // Draw all room outlines + drag overlay + preview rect
  refreshMapperOutlines();

  const overlay = document.createElementNS("http://www.w3.org/2000/svg","rect");
  overlay.setAttribute("x","0"); overlay.setAttribute("y","0");
  overlay.setAttribute("width","100"); overlay.setAttribute("height","100");
  overlay.setAttribute("fill","transparent");
  overlay.id = "map-overlay"; overlay.classList.add("dbg");
  overlay.style.cursor = "crosshair"; overlay.style.pointerEvents = "all";
  svg.appendChild(overlay);

  mapPreviewRect = document.createElementNS("http://www.w3.org/2000/svg","rect");
  mapPreviewRect.setAttribute("fill","rgba(126,207,224,0.15)");
  mapPreviewRect.setAttribute("stroke","#7ecfe0");
  mapPreviewRect.setAttribute("stroke-width","0.5");
  mapPreviewRect.setAttribute("stroke-dasharray","1.5,0.7");
  mapPreviewRect.classList.add("dbg");
  mapPreviewRect.style.display = "none";
  mapPreviewRect.style.pointerEvents = "none";
  svg.appendChild(mapPreviewRect);

  overlay.addEventListener("mousedown", onMapDown);
  overlay.addEventListener("mousemove", onMapMove);
  overlay.addEventListener("mouseup",   onMapUp);
  overlay.addEventListener("touchstart", e=>{e.preventDefault();onMapDown(e.touches[0]);},{passive:false});
  overlay.addEventListener("touchmove",  e=>{e.preventDefault();onMapMove(e.touches[0]);},{passive:false});
  overlay.addEventListener("touchend",   e=>onMapUp(e.changedTouches[0]));

  // Populate room list
  const list = document.getElementById("mapper-room-list");
  list.innerHTML = "";
  ROOMS.forEach(r => {
    const b = document.createElement("button");
    b.className = "mrb"; b.id = "mrb-"+r.id; b.textContent = r.label;
    b.onclick = () => selectMapRoom(r.id);
    list.appendChild(b);
  });
  selectMapRoom(ROOMS[0].id);
}

function closeMapper() {
  document.getElementById("mapper-panel").classList.remove("show");
  svg.querySelectorAll(".dbg").forEach(el => el.remove());
  activeMapRoom = null; mapDragStart = null; mapPreviewRect = null;
  ROOMS.forEach(r => renderRoom(r.id));
  updateCount(); updateImg();
  setStatus("Tap a room to toggle · Long-press to dim");
}

function svgPoint(e) {
  const r = svg.getBoundingClientRect();
  return {
    x: Math.round(((e.clientX - r.left) / r.width)  * 10000) / 100,
    y: Math.round(((e.clientY - r.top)  / r.height) * 10000) / 100
  };
}

function onMapDown(e) {
  if (!activeMapRoom) return;
  mapDragStart = svgPoint(e);
  if (mapPreviewRect) mapPreviewRect.style.display = "block";
}
function onMapMove(e) {
  if (!mapDragStart) return;
  const p = svgPoint(e);
  const x = Math.min(mapDragStart.x, p.x), y = Math.min(mapDragStart.y, p.y);
  const w = Math.abs(p.x - mapDragStart.x),  h = Math.abs(p.y - mapDragStart.y);
  if (mapPreviewRect) {
    mapPreviewRect.setAttribute("x",x); mapPreviewRect.setAttribute("y",y);
    mapPreviewRect.setAttribute("width",w); mapPreviewRect.setAttribute("height",h);
  }
  showMapInfo(x, y, w, h);
}
function onMapUp(e) {
  if (!mapDragStart || !activeMapRoom) return;
  const p = svgPoint(e);
  const x = Math.round(Math.min(mapDragStart.x, p.x) * 100) / 100;
  const y = Math.round(Math.min(mapDragStart.y, p.y) * 100) / 100;
  const w = Math.round(Math.abs(p.x - mapDragStart.x) * 100) / 100;
  const h = Math.round(Math.abs(p.y - mapDragStart.y) * 100) / 100;
  if (w > 0.5 && h > 0.5) {
    const room = ROOMS.find(r => r.id === activeMapRoom);
    if (room) { room.x=x; room.y=y; room.w=w; room.h=h; }
    refreshMapperOutlines();
    showMapInfo(x, y, w, h);
    // Auto-advance to next room
    const idx = ROOMS.findIndex(r => r.id === activeMapRoom);
    if (idx < ROOMS.length - 1) selectMapRoom(ROOMS[idx+1].id);
  }
  mapDragStart = null;
  if (mapPreviewRect) mapPreviewRect.style.display = "none";
}

function selectMapRoom(id) {
  activeMapRoom = id;
  document.querySelectorAll(".mrb").forEach(b => b.classList.remove("active"));
  const btn = document.getElementById("mrb-"+id);
  if (btn) { btn.classList.add("active"); btn.scrollIntoView({block:"nearest"}); }
  const r = ROOMS.find(r => r.id === id);
  if (r) showMapInfo(r.x, r.y, r.w, r.h);
  refreshMapperOutlines();
}

function showMapInfo(x, y, w, h) {
  document.getElementById("mapper-info").textContent =
    `x:${x.toFixed(2)}  y:${y.toFixed(2)}\nw:${w.toFixed(2)}  h:${h.toFixed(2)}`;
}

function refreshMapperOutlines() {
  const overlay = document.getElementById("map-overlay");
  const preview = mapPreviewRect;
  svg.querySelectorAll(".dbg-outline").forEach(el => el.remove());
  ROOMS.forEach(r => {
    const isActive = r.id === activeMapRoom;
    const mk = (tag, attrs) => {
      const el = document.createElementNS("http://www.w3.org/2000/svg",tag);
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
      el.classList.add("dbg","dbg-outline"); return el;
    };
    const rect = mk("rect",{x:r.x,y:r.y,width:r.w,height:r.h,
      fill: isActive ? "rgba(126,207,224,0.08)" : "rgba(245,200,66,0.05)",
      stroke: isActive ? "#7ecfe0" : "#f5c842",
      "stroke-width": isActive ? "0.55" : "0.3",
      "pointer-events":"none"});
    const label = mk("text",{x:r.x+r.w/2,y:r.y+r.h/2,
      "text-anchor":"middle","dominant-baseline":"middle",
      "font-size":"2.2","font-weight":"700","font-family":"system-ui,sans-serif",
      fill: isActive ? "#7ecfe0" : "#f5c842","pointer-events":"none"});
    label.textContent = r.label;
    // Insert before overlay so it stays on top
    if (overlay) { svg.insertBefore(rect, overlay); svg.insertBefore(label, overlay); }
    else { svg.appendChild(rect); svg.appendChild(label); }
  });
}

function copyCoords() {
  const lines = ROOMS.map(r =>
    `  {id:"${r.id}", label:"${r.label}", x:${r.x.toFixed(2)}, y:${r.y.toFixed(2)}, w:${r.w.toFixed(2)}, h:${r.h.toFixed(2)}}`
  ).join(",\n");
  navigator.clipboard.writeText(`const ROOMS = [\n${lines}\n];`).then(() => {
    const btn = document.getElementById("mapper-copy-btn");
    btn.textContent = "✓ Copied!";
    setTimeout(() => btn.textContent = "📋 Copy Coords", 2000);
  });
}
</script>
